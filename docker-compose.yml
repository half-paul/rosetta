services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rosetta
      POSTGRES_PASSWORD: rosetta
      POSTGRES_DB: rosetta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rosetta.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
